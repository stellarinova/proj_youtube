<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Article Library</title>
    <link rel="stylesheet" href="assets/css/style.css?v=2">
</head>
<body>
    <header>
        <h1>YouTube Article Library</h1>
        <p>Search and explore articles generated from YouTube videos.</p>
    </header>

    <section id="controls">
        <input type="text" id="search-input" placeholder="Search by keyword…" aria-label="Search">
        <select id="channel-filter">
            <option value="">All Channels</option>
        </select>
        <select id="topic-filter">
            <option value="">All Topics</option>
        </select>
    </section>

    <section id="results">
        <!-- article cards will be injected here -->
    </section>

    <footer>
        <small>Have a Nice Day!</small>
    </footer>

    <script src="assets/js/lunr.min.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/search.js"></script>
</body>
</html>
